<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9333EA;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E0E7FF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sparkleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FCD34D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F59E0B;stop-opacity:1" />
    </linearGradient>
    <!-- Nepali pattern gradient (subtle red accent) -->
    <linearGradient id="nepaliAccent" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#DC2626;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#DC2626;stop-opacity:0" />
    </linearGradient>
  </defs>
  
  <!-- Rounded square background -->
  <rect x="0" y="0" width="1024" height="1024" rx="220" fill="url(#bgGradient)"/>
  
  <!-- Subtle Nepali mountain pattern at bottom -->
  <path d="M0 824 L256 624 L384 724 L512 574 L640 724 L768 624 L1024 824 L1024 1024 L0 1024 Z" fill="url(#nepaliAccent)" opacity="0.4"/>
  
  <!-- Main chat bubble -->
  <path d="M280 320 C280 264 325 220 380 220 L644 220 C699 220 744 264 744 320 L744 520 C744 576 699 620 644 620 L480 620 L380 720 L380 620 L380 620 C325 620 280 576 280 520 Z" fill="url(#iconGradient)" opacity="0.95"/>
  
  <!-- Inner chat lines -->
  <rect x="340" y="340" width="280" height="32" rx="16" fill="#4F46E5" opacity="0.3"/>
  <rect x="340" y="400" width="200" height="32" rx="16" fill="#4F46E5" opacity="0.3"/>
  <rect x="340" y="460" width="240" height="32" rx="16" fill="#4F46E5" opacity="0.3"/>
  
  <!-- AI Sparkle/Star 1 (top right) -->
  <g transform="translate(680, 160)">
    <path d="M40 0 L48 32 L80 40 L48 48 L40 80 L32 48 L0 40 L32 32 Z" fill="url(#sparkleGradient)"/>
  </g>
  
  <!-- AI Sparkle/Star 2 (smaller, top) -->
  <g transform="translate(580, 120)">
    <path d="M20 0 L24 16 L40 20 L24 24 L20 40 L16 24 L0 20 L16 16 Z" fill="url(#sparkleGradient)" opacity="0.8"/>
  </g>
  
  <!-- AI Sparkle/Star 3 (right side) -->
  <g transform="translate(760, 280)">
    <path d="M25 0 L30 20 L50 25 L30 30 L25 50 L20 30 L0 25 L20 20 Z" fill="url(#sparkleGradient)" opacity="0.7"/>
  </g>
  
  <!-- Nepali sun rays hint (subtle) -->
  <circle cx="512" cy="850" r="60" fill="#FFFFFF" opacity="0.1"/>
  <circle cx="512" cy="850" r="40" fill="#FFFFFF" opacity="0.15"/>
</svg>